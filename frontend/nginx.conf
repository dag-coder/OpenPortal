server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript;

    # index.html — never cache so users always get the latest app
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed JS/CSS assets — cache forever (content hash guarantees freshness)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — every route returns index.html so React Router can handle it
    location / {
        try_files $uri $uri/ /index.html;
    }
}
